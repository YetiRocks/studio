name: "Yeti Studio"
app_id: "studio"
version: "1.0.0"
description: "Yeti administration web interface"
enabled: true
require_super_user: true

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build

auth:
  methods: [oauth, jwt]
  oauth:
    google:
      clientId: "${GOOGLE_CLIENT_ID}"
      clientSecret: "${GOOGLE_CLIENT_SECRET}"
    rules:
      - strategy: email
        pattern: "*@yetirocks.com"
        role: super_user
